apiVersion: v1
kind: Service
metadata:
  name: void-drifter-postgres
  namespace: void-drifter
  labels:
    app: void-drifter-postgres
spec:
  type: ClusterIP
  selector:
    app: void-drifter-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: void-drifter-postgres-data
  namespace: void-drifter
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: void-drifter-postgres
  namespace: void-drifter
  labels:
    app: void-drifter-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: void-drifter-postgres
  template:
    metadata:
      labels:
        app: void-drifter-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: void_drifter
            - name: POSTGRES_USER
              value: void_drifter
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: void-drifter-backend-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - void_drifter
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - void_drifter
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: void-drifter-postgres-data
