name: Build and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/build-and-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-and-deploy-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump kustomization tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Test backend
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/void-drifter-backend:${TAG}"
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION=v5.8.1
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin/

      - name: Bump image tag in k8s/kustomization.yaml
        working-directory: k8s
        run: kustomize edit set image romainecr.azurecr.io/void-drifter-backend=romainecr.azurecr.io/void-drifter-backend:${{ env.TAG }}

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No kustomization changes to commit"
            exit 0
          fi
          git commit -m "chore: bump void drifter backend image to ${{ env.TAG }} [skip ci]"
          git push
